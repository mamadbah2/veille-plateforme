<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>DevPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@500;700;800&family=JetBrains+Mono:wght@400;500&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#7C3AED", /* Violet 600 - Deep Vibrant Purple */
              "primary-dark": "#8B5CF6", /* Violet 500 - Lighter for dark mode contrast */
              "background-light": "#ffffff",
              "background-dark": "#000000",
              "surface-light": "#F4F4F5", /* Zinc 100 - Cool neutral gray */
              "surface-dark": "#18181B",  /* Zinc 900 - Deep neutral black */
              "ios-separator": "#E4E4E7", /* Zinc 200 */
              "ios-separator-dark": "#27272A", /* Zinc 800 */
            },
            fontFamily: {
              sans: ["Inter", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
              display: ["Inter Tight", "Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
              serif: ["Merriweather", "Georgia", "serif"],
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              spinCustom: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              }
            },
            animation: {
              fadeInUp: 'fadeInUp 0.4s ease-out forwards',
              fadeIn: 'fadeIn 0.2s ease-out forwards',
              spinCustom: 'spinCustom 1s linear infinite',
            }
          },
        },
      };
    </script>
    <style>
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      body {
        background-color: #F4F4F5; /* Matches surface-light */
        overscroll-behavior-y: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      @media (prefers-color-scheme: dark) {
          body {
              background-color: #000000;
          }
      }
      #root {
        min-height: 100vh;
        width: 100%;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
