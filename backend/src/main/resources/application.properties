spring.application.name=veille
server.port=4040

# AIA Configuration (LM Studio)
# AI Provider Configuration (Generic)
# Type: openai (works for LM Studio, DeepSeek, LocalAI), anthropic, gemini
ai.provider.type=openai
ai.provider.url=http://localhost:1234
ai.provider.api-key=not-needed-for-local
ai.provider.model=qwen2.5-coder-3b-instruct
ai.provider.embedding-model=text-embedding-nomic-embed-text-v1.5
ai.provider.timeout=60000

# Force UTF-8 encoding everywhere
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# Database configuration
spring.data.mongodb.uri=mongodb+srv://mamadbah:${MONGO_PASS}@cluster0.wlwhrhg.mongodb.net/?appName=Cluster0
spring.data.mongodb.database=veille

# RSA Keys configuration
rsa.private-key=classpath:certs/private.pem
rsa.public-key=classpath:certs/public.pem

# OAuth2 Configuration (Exemple avec Google, idem pour GitHub)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,address,phone
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth

# Configuration GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email

# URL de redirection Frontend après succès
application.frontend.url=${FRONTEND_URL:http://localhost:3000}/auth/callback
